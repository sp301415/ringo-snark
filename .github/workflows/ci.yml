name: CI Tests
on:
  push:

jobs:
  tests:
    name: Run Go ${{ matrix.go }} Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.24", "1.25"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Test Jindo
        run: |
          go test ./jindo -timeout=0 -count=1

      - name: Test Buckler
        run: |
          go test ./buckler_old -timeout=0 -count=1
